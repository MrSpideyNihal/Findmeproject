name: Find-Projects CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Security Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm config set registry https://registry.npmjs.org
        npm ci

    - name: Run ESLint (Static Analysis)
      run: npm run lint

    - name: Run Build (TypeScript & Routing Compilation)
      run: npm run build
      env:
        MONGODB_URI: "mongodb://127.0.0.1:27017/raisoni-projects-test"
        NEXTAUTH_SECRET: "ci_testing_secret_key_32_chars_long_minimum"
        NEXTAUTH_URL: "http://localhost:3000"
        TEACHER_REGISTRATION_CODE: "raisoni_sec_2027"
